# One service, one Go binary.  The backend compiles the TypeScript
# frontend in-process (via esbuild's Go library) and serves the
# resulting JS/CSS/HTML alongside the /api/* endpoints.  No Node.js,
# Vite, or nginx at runtime.
services:
  antenna-studio:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CORS_ORIGINS=http://localhost:8080
